name: Daily Windy Data Fetch

on:
  schedule:
    - cron: "0 0 * * 2"  # every Tuesday at 00:00 UTC
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests pandas
      - name: Run script
        run: python windyAPI.py --start-date $(date +%Y-%m-%d) --end-date $(date -d '+6 days' +%Y-%m-%d)
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add precip.json windy_response.json forecasts.json || true
          git commit -m "Update precipitation data $(date -u +"%Y-%m-%d_%H-%M-%S")" || true
          git pull --rebase
          git push
